name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ["8.2", "8.3", "8.4"]
        symfony-version: ["5.4.*", "6.4.*", "7.2.*"]
        exclude:
          - php-version: "8.2"
            symfony-version: "7.2.*"
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
      - name: Require Symfony ${{ matrix.symfony-version }}
        run: |
          composer require \
            "symfony/config:${{ matrix.symfony-version }}" \
            "symfony/dependency-injection:${{ matrix.symfony-version }}" \
            "symfony/http-client:${{ matrix.symfony-version }}" \
            "symfony/http-kernel:${{ matrix.symfony-version }}" \
            "symfony/framework-bundle:${{ matrix.symfony-version }}" \
            --no-update
      - run: composer install --prefer-dist --no-progress
      - run: vendor/bin/phpunit
